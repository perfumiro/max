    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #fff;
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }
        .logo::after {
            content: '';
            display: inline-block;
            width: 0.28em;
            height: 0.28em;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4444 30%, #cc0000 100%);
            box-shadow: 0 0 10px 3px rgba(255,60,60,0.6);
            margin-left: 0.05em;
            vertical-align: super;
            font-size: 0.6em;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }
        h1 {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #f0f0f0;
        }
        p {
            font-size: 1rem;
            color: #888;
            max-width: 400px;
            line-height: 1.65;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #cc0000;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #e00; }
        .divider {
            width: 48px;
            height: 2px;
            background: #cc0000;
            margin: 2rem auto;
            opacity: 0.5;
        }
        .tip {
            font-size: 0.8rem;
            color: #555;
            max-width: 360px;
        }
    </style>
<!--Start of Tawk.to Script-->
<script type="text/javascript">
var Tawk_API=Tawk_API||{};
var Tawk_LoadStart=new Date();
Tawk_API.onLoad=function(){
  Tawk_API.hideWidget();
  /* ── Custom floating chat button with IPORDISE logo ── */
  var style=document.createElement('style');
  style.textContent='\
    #ipo-tawk-btn{\
      position:fixed;\
      bottom:calc(72px + 0.75rem + env(safe-area-inset-bottom,0px));\
      right:1.25rem;\
      width:62px;height:62px;\
      border-radius:50%;\
      background:#1a1a1a;\
      box-shadow:0 6px 24px rgba(0,0,0,.45),0 0 0 2.5px rgba(201,168,76,.45);\
      cursor:pointer;\
      z-index:99999;\
      border:none;\
      padding:0;\
      overflow:hidden;\
      transition:transform .18s ease,box-shadow .18s ease;\
      -webkit-tap-highlight-color:transparent;\
    }\
    #ipo-tawk-btn:hover{\
      transform:scale(1.09);\
      box-shadow:0 10px 32px rgba(0,0,0,.55),0 0 0 3px rgba(201,168,76,.65);\
    }\
    #ipo-tawk-btn img{\
      width:100%;height:100%;\
      object-fit:cover;\
      border-radius:50%;\
      display:block;\
    }\
    #ipo-tawk-dot{\
      position:absolute;top:2px;right:2px;\
      width:13px;height:13px;\
      background:#4ade80;\
      border-radius:50%;\
      border:2.5px solid #1a1a1a;\
      animation:ipo-tawk-pulse 2.2s ease-in-out infinite;\
    }\
    @keyframes ipo-tawk-pulse{\
      0%,100%{transform:scale(1);opacity:1}\
      50%{transform:scale(1.3);opacity:.6}\
    }\
    @media(min-width:640px){\
      #ipo-tawk-btn{bottom:2rem;right:2rem;width:66px;height:66px;}\
    }\
  ';
  document.head.appendChild(style);
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;bottom:calc(72px + 0.75rem + env(safe-area-inset-bottom,0px));right:1.25rem;z-index:99999;';
  wrap.innerHTML='\
    <button id="ipo-tawk-btn" aria-label="Chat with us">\
      <img src="assets/chatbot logo.png" alt="Chat" loading="lazy"/>\
      <div id="ipo-tawk-dot"></div>\
    </button>';
  document.body.appendChild(wrap);
  document.getElementById('ipo-tawk-btn').addEventListener('click',function(){
    Tawk_API.maximize();
  });
};

var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];

})();
</script>
