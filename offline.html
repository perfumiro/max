    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #fff;
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }
        .logo::after {
            content: '';
            display: inline-block;
            width: 0.28em;
            height: 0.28em;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4444 30%, #cc0000 100%);
            box-shadow: 0 0 10px 3px rgba(255,60,60,0.6);
            margin-left: 0.05em;
            vertical-align: super;
            font-size: 0.6em;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }
        h1 {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #f0f0f0;
        }
        p {
            font-size: 1rem;
            color: #888;
            max-width: 400px;
            line-height: 1.65;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #cc0000;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #e00; }
        .divider {
            width: 48px;
            height: 2px;
            background: #cc0000;
            margin: 2rem auto;
            opacity: 0.5;
        }
        .tip {
            font-size: 0.8rem;
            color: #555;
            max-width: 360px;
        }
    </style>
<!--Start of Tawk.to Script-->
<script type="text/javascript">
var Tawk_API=Tawk_API||{};
var Tawk_LoadStart=new Date();
Tawk_API.onLoad=function(){
  Tawk_API.hideWidget();
  /* ── Custom floating chat button with IPORDISE logo ── */
  var style=document.createElement('style');
  style.textContent='\
    #ipo-tawk-wrap{\
      position:fixed;\
      bottom:calc(72px + 0.75rem + env(safe-area-inset-bottom,0px));\
      right:1.25rem;\
      z-index:99999;\
      display:flex;\
      align-items:center;\
      justify-content:center;\
      animation:ipo-slide-in .55s cubic-bezier(.34,1.56,.64,1) both;\
    }\
    @keyframes ipo-slide-in{\
      from{opacity:0;transform:translateY(32px) scale(.7);}\
      to{opacity:1;transform:translateY(0) scale(1);}\
    }\
    #ipo-tawk-btn{\
      position:relative;\
      width:62px;height:62px;\
      border-radius:50%;\
      background:#1a1a1a;\
      box-shadow:0 6px 28px rgba(0,0,0,.5),0 0 0 2.5px rgba(201,168,76,.5);\
      cursor:pointer;\
      border:none;\
      padding:0;\
      overflow:visible;\
      -webkit-tap-highlight-color:transparent;\
      animation:ipo-float 3.6s ease-in-out infinite;\
      transition:transform .15s ease,box-shadow .15s ease;\
    }\
    @keyframes ipo-float{\
      0%,100%{transform:translateY(0);}\
      50%{transform:translateY(-6px);}\
    }\
    #ipo-tawk-btn:hover{\
      animation:none;\
      transform:scale(1.12);\
      box-shadow:0 12px 36px rgba(0,0,0,.55),0 0 0 3.5px rgba(201,168,76,.75);\
    }\
    #ipo-tawk-btn:active{\
      transform:scale(.93);\
      box-shadow:0 4px 14px rgba(0,0,0,.4);\
    }\
    #ipo-tawk-img{\
      width:100%;height:100%;\
      object-fit:cover;\
      border-radius:50%;\
      display:block;\
      pointer-events:none;\
    }\
    .ipo-ring{\
      position:absolute;\
      inset:-1px;\
      border-radius:50%;\
      border:2.5px solid rgba(201,168,76,.7);\
      animation:ipo-ring-out 2.8s ease-out infinite;\
      pointer-events:none;\
    }\
    .ipo-ring:nth-child(2){animation-delay:.9s;}\
    .ipo-ring:nth-child(3){animation-delay:1.8s;}\
    @keyframes ipo-ring-out{\
      0%{transform:scale(1);opacity:.8;}\
      100%{transform:scale(1.75);opacity:0;}\
    }\
    #ipo-tawk-dot{\
      position:absolute;\
      top:1px;right:1px;\
      width:14px;height:14px;\
      background:#4ade80;\
      border-radius:50%;\
      border:2.5px solid #1a1a1a;\
      animation:ipo-dot-beat 2s ease-in-out infinite;\
      z-index:2;\
    }\
    @keyframes ipo-dot-beat{\
      0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(74,222,128,.6);}\
      50%{transform:scale(1.25);box-shadow:0 0 0 5px rgba(74,222,128,0);}\
    }\
    #ipo-tawk-label{\
      position:absolute;\
      right:calc(100% + 10px);\
      top:50%;\
      transform:translateY(-50%);\
      background:#1a1a1a;\
      color:#c9a84c;\
      font-size:.72rem;\
      font-weight:600;\
      font-family:Inter,system-ui,sans-serif;\
      padding:.3rem .7rem;\
      border-radius:2rem;\
      white-space:nowrap;\
      box-shadow:0 4px 14px rgba(0,0,0,.3);\
      pointer-events:none;\
      animation:ipo-label-show .4s ease .9s both;\
    }\
    @keyframes ipo-label-show{\
      from{opacity:0;transform:translateY(-50%) translateX(8px);}\
      to{opacity:1;transform:translateY(-50%) translateX(0);}\
    }\
    @media(prefers-reduced-motion:reduce){\
      #ipo-tawk-btn,#ipo-tawk-dot,.ipo-ring,#ipo-tawk-wrap,#ipo-tawk-label{animation:none!important;}\
    }\
    @media(min-width:640px){\
      #ipo-tawk-wrap{bottom:2rem;right:2rem;}\
      #ipo-tawk-btn{width:66px;height:66px;}\
    }\
  ';
  document.head.appendChild(style);
  var wrap=document.createElement('div');
  wrap.id='ipo-tawk-wrap';
  wrap.innerHTML='\
    <span id="ipo-tawk-label">Chat with us 💬</span>\
    <button id="ipo-tawk-btn" aria-label="Chat with us">\
      <div class="ipo-ring"></div>\
      <div class="ipo-ring"></div>\
      <div class="ipo-ring"></div>\
      <img id="ipo-tawk-img" src="assets/Zakaria chatbot photo.jpeg" alt="Chat" loading="lazy"/>\
      <div id="ipo-tawk-dot"></div>\
    </button>';
  document.body.appendChild(wrap);
  document.getElementById('ipo-tawk-btn').addEventListener('click',function(){
    Tawk_API.maximize();
  });
};

var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];

s1.charset='UTF-8';

s0.parentNode.insertBefore(s1,s0);
})();
</script>
<!--End of Tawk.to Script-->

    <button class="btn" onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9A9 9 0 0114.47 3.5L23 10M1 14l8.53 6.5A9 9 0 0020.49 15"/></svg>
        Try Again
    </button>

    <div class="divider"></div>
    <p class="tip">Some pages may still be available from cache — tap Back to browse what was already loaded.</p>
