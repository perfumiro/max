<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>IPORDISE – You're Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #fff;
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }
        .logo::after {
            content: '';
            display: inline-block;
            width: 0.28em;
            height: 0.28em;
            border-radius: 50%;
            background: radial-gradient(circle, #ff4444 30%, #cc0000 100%);
            box-shadow: 0 0 10px 3px rgba(255,60,60,0.6);
            margin-left: 0.05em;
            vertical-align: super;
            font-size: 0.6em;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }
        h1 {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #f0f0f0;
        }
        p {
            font-size: 1rem;
            color: #888;
            max-width: 400px;
            line-height: 1.65;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #cc0000;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #e00; }
        .divider {
            width: 48px;
            height: 2px;
            background: #cc0000;
            margin: 2rem auto;
            opacity: 0.5;
        }
        .tip {
            font-size: 0.8rem;
            color: #555;
            max-width: 360px;
        }
    </style>
</head>
<body>
    <div class="logo">IPORDISE</div>

    <svg class="icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="36" cy="36" r="34" stroke="#444" stroke-width="2"/>
        <path d="M22 50 L36 22 L50 50" stroke="#666" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M27 41 h18" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="36" cy="56" r="2.5" fill="#cc0000"/>
    </svg>

    <h1>You're currently offline</h1>
    <p>It looks like you've lost your internet connection. Check your Wi-Fi or mobile data and try again.</p>

    <button class="btn" onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9A9 9 0 0114.47 3.5L23 10M1 14l8.53 6.5A9 9 0 0020.49 15"/></svg>
        Try Again
    </button>

    <div class="divider"></div>
    <p class="tip">Some pages may still be available from cache — tap Back to browse what was already loaded.</p>
</body>
</html>
