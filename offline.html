<script type="text/javascript">
var Tawk_API=Tawk_API||{};
var Tawk_LoadStart=new Date();
Tawk_API.onLoad=function(){
  Tawk_API.hideWidget();
  /* ── Custom floating chat button with IPORDISE logo ── */
  var style=document.createElement('style');
  style.textContent='\
    #ipo-tawk-wrap{\
      position:fixed;\
      bottom:calc(72px + 0.75rem + env(safe-area-inset-bottom,0px));\
      right:1.25rem;\
      z-index:99999;\
      display:flex;\
      align-items:center;\
      justify-content:center;\
      animation:ipo-pop-in .4s cubic-bezier(.34,1.56,.64,1) both;\
    }\
    @keyframes ipo-pop-in{\
      from{opacity:0;transform:scale(.6);}\
      to{opacity:1;transform:scale(1);}\
    }\
    #ipo-tawk-btn{\
      position:relative;\
      width:60px;height:60px;\
      border-radius:50%;\
      background:#25D366;\
      box-shadow:0 8px 30px rgba(0,0,0,.28);\
      cursor:pointer;\
      border:none;\
      padding:0;\
      overflow:visible;\
      -webkit-tap-highlight-color:transparent;\
      display:flex;\
      align-items:center;\
      justify-content:center;\
      transition:transform .18s ease,box-shadow .18s ease;\
    }\
    #ipo-tawk-btn:hover{\
      transform:scale(1.1);\
      box-shadow:0 12px 38px rgba(0,0,0,.32);\
    }\
    #ipo-tawk-btn:active{transform:scale(.92);}\
    #ipo-tawk-img{\
      color:#fff;\
      font-size:34px;\
      line-height:1;\
      pointer-events:none;\
      display:block;\
    }\
    #ipo-tawk-dot{\
      position:absolute;\
      top:-11px;right:-11px;\
      width:26px;height:26px;\
      background:linear-gradient(135deg,#ff2525 0%,#c40000 100%);\
      color:#fff;\
      font-size:13px;\
      font-weight:900;\
      font-family:Inter,system-ui,sans-serif;\
      border-radius:50%;\
      display:flex;\
      align-items:center;\
      justify-content:center;\
      border:3px solid #fff;\
      z-index:5;\
      box-shadow:0 0 0 0 rgba(239,68,68,.75),0 4px 18px rgba(196,0,0,.60);\
      animation:ipo-bdg-pop .6s cubic-bezier(.34,1.56,.64,1) 1.5s both,ipo-bdg-pulse 2.2s ease-out 2.5s infinite,ipo-bdg-shake 5s ease-in-out 6s infinite;\
      pointer-events:none;\
      line-height:1;\
      letter-spacing:-.5px;\
    }\
    @keyframes ipo-bdg-pop{\
      0%{transform:scale(0) rotate(-30deg);opacity:0;filter:blur(4px);}\
      40%{transform:scale(1.6) rotate(12deg);opacity:1;filter:blur(0);}\
      60%{transform:scale(.82) rotate(-6deg);}\
      80%{transform:scale(1.15) rotate(3deg);}\
      100%{transform:scale(1) rotate(0deg);opacity:1;}\
    }\
    @keyframes ipo-bdg-pulse{\
      0%{box-shadow:0 0 0 0 rgba(239,68,68,.9),0 0 0 0 rgba(239,68,68,.45),0 4px 18px rgba(196,0,0,.60);}\
      50%{box-shadow:0 0 0 14px rgba(239,68,68,0),0 0 0 7px rgba(239,68,68,.22),0 4px 18px rgba(196,0,0,.60);}\
      100%{box-shadow:0 0 0 0 rgba(239,68,68,0),0 0 0 0 rgba(239,68,68,0),0 4px 18px rgba(196,0,0,.60);}\
    }\
    @keyframes ipo-bdg-shake{\
      0%,85%,100%{transform:scale(1) rotate(0deg);}\
      88%{transform:scale(1.2) rotate(-12deg);}\
      91%{transform:scale(1.2) rotate(12deg);}\
      94%{transform:scale(1.1) rotate(-7deg);}\
      97%{transform:scale(1.1) rotate(7deg);}\
    }\
    @media(prefers-reduced-motion:reduce){\
      #ipo-tawk-wrap{animation:none;}\
    }\
    @media(min-width:640px){\
      #ipo-tawk-wrap{bottom:2rem;right:2rem;}\
      #ipo-tawk-btn{width:64px;height:64px;}\
    }\
  ';
  document.head.appendChild(style);
  var wrap=document.createElement('div');
  wrap.id='ipo-tawk-wrap';
  wrap.innerHTML='\
    <button id="ipo-tawk-btn" aria-label="Chat with us">\
      <i id="ipo-tawk-img" class="fab fa-whatsapp"></i>\
      <div id="ipo-tawk-dot">1</div>\
    </button>';
  document.body.appendChild(wrap);
  document.getElementById('ipo-tawk-btn').addEventListener('click',function(){
    var b=document.getElementById('ipo-tawk-dot');
    if(b){b.style.transition='transform .2s,opacity .2s';b.style.transform='scale(0)';b.style.opacity='0';setTimeout(function(){b.style.display='none';},220);}
    Tawk_API.maximize();
  });

};
