<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPORDISE - Thank You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../script.js"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-white text-gray-800 font-sans antialiased">

    <main class="bg-brand-light min-h-screen flex items-center justify-center px-4 py-12">
        <section class="max-w-2xl w-full bg-white rounded-2xl border border-gray-100 shadow-sm p-8 sm:p-10 text-center">
            <div class="w-16 h-16 mx-auto rounded-full bg-green-100 text-green-600 flex items-center justify-center text-2xl mb-5">
                <i class="fas fa-check"></i>
            </div>

            <p class="text-xs uppercase tracking-[0.14em] text-gray-500 font-bold mb-2">Order Confirmation</p>
            <h1 class="text-3xl sm:text-4xl font-serif font-bold text-brand-dark">Thank You For Your Order</h1>
            <p class="mt-3 text-gray-600" id="thankYouCopy">Your confirmation has been received. Our team will contact you shortly.</p>

            <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
                <a href="../discover.html" class="inline-flex items-center justify-center gap-2 rounded-xl bg-brand-red hover:bg-brand-redHover text-white font-bold px-6 py-3 transition">
                    Continue Shopping <i class="fas fa-arrow-right text-xs"></i>
                </a>
                <a href="track-order.html" class="inline-flex items-center justify-center gap-2 rounded-xl border border-gray-300 text-gray-700 font-semibold px-6 py-3 hover:bg-gray-100 transition">
                    Track Order
                </a>
            </div>
        </section>
    </main>

    <script>
        (function () {
            sessionStorage.removeItem('ipordise-order-confirm-pending');
            sessionStorage.removeItem('ipordise-order-confirm-left-page');

            var copyEl = document.getElementById('thankYouCopy');
            var channel = new URLSearchParams(window.location.search).get('channel');
            if (!copyEl) return;

            if (channel === 'whatsapp') {
                copyEl.textContent = 'Your WhatsApp confirmation has been prepared. Our team will contact you shortly.';
            }

            if (channel === 'email') {
                copyEl.textContent = 'Your email confirmation has been prepared. Our team will contact you shortly.';
            }
        })();
    </script>
</body>
</html>
