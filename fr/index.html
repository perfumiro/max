<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPORDISE | Acheter des Parfums de Luxe au Maroc</title>
    <!-- Canonical points to the root homepage — no duplicate indexing -->
    <link rel="canonical" href="https://ipordise.com/">

    <!-- Instant JS redirect — preserves lang=fr param for the site's i18n -->

    <meta http-equiv="refresh" content="0; url=https://ipordise.com/?lang=fr">
</head>
<body>
    <p>Redirection vers <a href="https://ipordise.com/?lang=fr">IPORDISE — Parfums de Luxe au Maroc</a>…</p>
